{% extends "base.html" %}

{% block title %}Chat bot - Food Shop{% endblock %}

{% block content %}
    <h1 class="page-title">Chat bot</h1>

    <div class="chat">
        <div class="chat__messages" id="chatMessages" role="log" aria-live="polite">
            <div class="chat__bubble chat__bubble--bot">
                Chào bạn! Bạn muốn tìm món nào hoặc xem giỏ hàng?
            </div>
        </div>

        <div class="chat__quick">
            <button class="chat__quick-btn" type="button" onclick="sendQuick('Tìm phở')">Tìm phở</button>
            <button class="chat__quick-btn" type="button" onclick="sendQuick('Menu đồ uống')">Menu đồ uống</button>
            <button class="chat__quick-btn" type="button" onclick="sendQuick('Giỏ hàng của tôi')">Giỏ hàng</button>
        </div>

        <form class="chat__form" id="chatForm">
            {% csrf_token %}
            <input class="chat__input" id="chatInput" type="text" placeholder="Nhập câu hỏi..." autocomplete="off" />
            <button class="btn btn--primary" type="submit">Gửi</button>
        </form>
    </div>

    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const csrftoken = getCookie('csrftoken');
        const form = document.getElementById('chatForm');
        const input = document.getElementById('chatInput');
        const messages = document.getElementById('chatMessages');

        function addBubble(text, who) {
            const div = document.createElement('div');
            div.className = 'chat__bubble ' + (who === 'me' ? 'chat__bubble--me' : 'chat__bubble--bot');
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage(text) {
            const msg = (text || '').trim();
            if (!msg) return;

            addBubble(msg, 'me');
            input.value = '';

            const res = await fetch("{% url 'chat_api' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken,
                },
                body: JSON.stringify({ message: msg })
            });

            const data = await res.json();
            addBubble(data.reply || 'Có lỗi xảy ra.', 'bot');
        }

        function sendQuick(text) {
            sendMessage(text);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            sendMessage(input.value);
        });
    </script>
{% endblock %}
